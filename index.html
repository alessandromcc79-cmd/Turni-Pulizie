<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turni Pulizie Casa</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            font-size: 24px;
        }
        .week-info {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .turno-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 10px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid #2ecc71;
        }
        .persona {
            font-weight: bold;
            color: #2c3e50;
        }
        .compito {
            color: #27ae60;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧹 Turni Pulizie Settimanali</h1>
    <div class="week-info" id="week-display">Caricamento settimana...</div>
    
    <div id="turni-list">
        </div>
</div>

<script>
    const persone = ["Ale", "Marco S.", "Marco M."];
    const zone = ["Cucina", "Bagno & Bagnetto", "Corridoio"];

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        var weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        return weekNo;
    }

    function generaTurni() {
        const oggi = new Date();
        const settimanaCorrente = getWeekNumber(oggi);
        const annoCorrente = oggi.getFullYear();
        
        document.getElementById('week-display').innerText = `Settimana N° ${settimanaCorrente} del ${annoCorrente}`;
        
        const listaContainer = document.getElementById('turni-list');
        listaContainer.innerHTML = ''; 

        const totali = persone.length;

        persone.forEach((persona, index) => {
            // Configurato per far partire la combinazione esatta da domani (settimana 26)
            let indiceZona = (index + (settimanaCorrente - 26)) % totali;
            if (indiceZona < 0) {
                indiceZona += totali;
            }
            const zonaAssegnata = zone[indiceZona];

            const row = document.createElement('div');
            row.className = 'turno-row';
            row.innerHTML = `
                <span class="persona">${persona}</span>
                <span class="compito">${zonaAssegnata}</span>
            `;
            listaContainer.appendChild(row);
        });
    }

    generaTurni();
</script>

</body>
</html>
