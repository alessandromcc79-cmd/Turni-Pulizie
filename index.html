<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turni Pulizie Casa</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            font-size: 24px;
        }
        .week-info {
            text-align: center;
            color: #7f8c8d;
            font-size: 15px;
            margin-bottom: 25px;
            font-weight: 500;
            text-transform: capitalize;
        }
        .turno-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 10px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid #2ecc71;
        }
        .persona {
            font-weight: bold;
            color: #2c3e50;
        }
        .compito {
            color: #27ae60;
            font-weight: 500;
        }

        /* STILI DELLA BARRA TEMPORALE CORRETTI */
        .timeline-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
            width: 100%;
        }
        .timeline-title {
            text-align: center;
            font-size: 13px;
            color: #95a5a6;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .timeline {
            display: flex;
            justify-content: space-between;
            position: relative;
            width: 100%;
            padding: 0;
        }
        /* La linea grigia di sfondo orizzontale */
        .timeline::before {
            content: '';
            position: absolute;
            top: 29px; /* Allineata perfettamente al centro dei pallini */
            left: 15px;
            right: 15px;
            height: 4px;
            background-color: #e0e0e0;
            z-index: 1;
        }
        .day-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            flex: 1; /* Distribuisce i giorni in modo equo su tutta la larghezza */
        }
        .day-label {
            font-size: 12px;
            font-weight: 600;
            color: #7f8c8d;
            margin-bottom: 8px;
        }
        .dot {
            width: 12px;
            height: 12px;
            background-color: #bdc3c7;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        /* Stile per il giorno corrente (Ago attivo) */
        .day-step.active .dot {
            background-color: #e74c3c;
            transform: scale(1.4);
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.6);
        }
        .day-step.active .day-label {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧹 Turni Pulizie Settimanali</h1>
    <div class="week-info" id="week-display">Caricamento date...</div>
    
    <div id="turni-list">
        </div>

    <div class="timeline-container">
        <div class="timeline-title">Avanzamento Settimana</div>
        <div class="timeline" id="timeline-days">
            <div class="day-step" id="day-1"><span class="day-label">Lun</span><div class="dot"></div></div>
            <div class="day-step" id="day-2"><span class="day-label">Mar</span><div class="dot"></div></div>
            <div class="day-step" id="day-3"><span class="day-label">Mer</span><div class="dot"></div></div>
            <div class="day-step" id="day-4"><span class="day-label">Gio</span><div class="dot"></div></div>
            <div class="day-step" id="day-5"><span class="day-label">Ven</span><div class="dot"></div></div>
            <div class="day-step" id="day-6"><span class="day-label">Sab</span><div class="dot"></div></div>
            <div class="day-step" id="day-7"><span class="day-label">Dom</span><div class="dot"></div></div>
        </div>
    </div>
</div>

<script>
    const persone = ["Ale", "Marco S.", "Marco M."];
    const zone = ["Cucina", "Bagno & Bagnetto", "Corridoio"];

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        var weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        return weekNo;
    }

        const distanzaDalLunedi = giornoSettimana === 0 ? -6 : 1 - giornoSettimana;

        if (lunedi.getMonth() === domenica.getMonth()) {
            const meseAnnoStr = domenica.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
            return `dal ${lunedi.getDate()} al ${domenica.getDate()} ${meseAnnoStr}`;
        } else {
            const lunediStr = lunedi.toLocaleDateString('it-IT', { day: 'numeric', month: 'long' });
            const domenicaStr = domenica.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
            return `dal ${lunediStr} al ${domenicaStr}`;
        }
    }

    function aggiornaTimeline(oggi) {
        let giornoCorrente = oggi.getDay();
        let indiceTimeline = giornoCorrente === 0 ? 7 : giornoCorrente;
        
        for (let i = 1; i <= 7; i++) {
            document.getElementById(`day-${i}`).classList.remove('active');
        }
        
        const elementoGiorno = document.getElementById(`day-${indiceTimeline}`);
        if (elementoGiorno) {
            elementoGiorno.classList.add('active');
        }
    }

    function generaTurni() {
        const oggi = new Date();
        const settimanaCorrente = getWeekNumber(oggi);
        
        document.getElementById('week-display').innerText = `Settimana ${getWeekRangeString(oggi)}`;
        
        const listaContainer = document.getElementById('turni-list');
        listaContainer.innerHTML = ''; 

        const totali = persone.length;

        persone.forEach((persona, index) => {
            let indiceZona = (index + (settimanaCorrente - 26)) % totali;
            if (indiceZona < 0) {
                indiceZona += totali;
            }
            const zonaAssegnata = zone[indiceZona];

            const row = document.createElement('div');
            row.className = 'turno-row';
            row.innerHTML = `
                <span class="persona">${persona}</span>
                <span class="compito">${zonaAssegnata}</span>
            `;
            listaContainer.appendChild(row);
        });
