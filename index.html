<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turni Pulizie Casa</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            font-size: 24px;
        }
        .week-info {
            text-align: center;
            color: #7f8c8d;
            font-size: 15px;
            margin-bottom: 25px;
            font-weight: 500;
            text-transform: capitalize;
        }
        .turno-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 10px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid #2ecc71;
        }
        .persona {
            font-weight: bold;
            color: #2c3e50;
        }
        .compito {
            color: #27ae60;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧹 Turni Pulizie Settimanali</h1>
    <div class="week-info" id="week-display">Caricamento date...</div>
    
    <div id="turni-list">
        </div>
</div>

<script>
    const persone = ["Ale", "Marco S.", "Marco M."];
    const zone = ["Cucina", "Bagno & Bagnetto", "Corridoio"];

    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        var weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        return weekNo;
    }

    function getWeekRangeString(d) {
        const corrente = new Date(d);
        const giornoSettimana = corrente.getDay();
        // Calcoliamo il lunedì della settimana corrente
        const distanzaDalLunedi = giornoSettimana === 0 ? -6 : 1 - giornoSettimana;
        
        const lunedi = new Date(corrente);
        lunedi.setDate(corrente.getDate() + distanzaDalLunedi);
        
        const domenica = new Date(lunedi);
        domenica.setDate(lunedi.getDate() + 6);
        
        const opzioni = { day: 'numeric' };
        const opzioniMeseAnno = { day: 'numeric', month: 'long', year: 'numeric' };
        
        // Se il mese è lo stesso, ottimizziamo la stringa (es. dal 22 al 28 Giugno 2026)
        if (lunedi.getMonth() === domenica.getMonth()) {
            const meseAnnoStr = domenica.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
            return `dal ${lunedi.getDate()} al ${domenica.getDate()} ${meseAnnoStr}`;
        } else {
            // Se i mesi cambiano a metà settimana
            const lunediStr = lunedi.toLocaleDateString('it-IT', { day: 'numeric', month: 'long' });
            const domenicaStr = domenica.toLocaleDateString('it-IT', opzioniMeseAnno);
            return `dal ${lunediStr} al ${domenicaStr}`;
        }
    }

    function generaTurni() {
        const oggi = new Date();
        const settimanaCorrente = getWeekNumber(oggi);
        
        // Mostra l'intervallo di date esatto della settimana
        document.getElementById('week-display').innerText = `Settimana ${getWeekRangeString(oggi)}`;
        
        const listaContainer = document.getElementById('turni-list');
        listaContainer.innerHTML = ''; 

        const totali = persone.length;

        persone.forEach((persona, index) => {
            let indiceZona = (index + (settimanaCorrente - 26)) % totali;
            if (indiceZona < 0) {
                indiceZona += totali;
            }
            const zonaAssegnata = zone[indiceZona];

            const row = document.createElement('div');
            row.className = 'turno-row';
            row.innerHTML = `
                <span class="persona">${persona}</span>
                <span class="compito">${zonaAssegnata}</span>
            `;
            listaContainer.appendChild(row);
        });
    }

    generaTurni();
</script>

</body>
</html>
